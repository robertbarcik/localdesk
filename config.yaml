# LocalDesk Configuration
# Switch between "local" and "cloud" mode

mode: "cloud"

local:
  base_url: "http://localhost:11434/v1"
  model: "qwen3:1.7b"
  api_key: "not-needed"

cloud:
  base_url: "https://openrouter.ai/api/v1"
  model: "qwen/qwen3-30b-a3b"
  api_key: "${OPENROUTER_API_KEY}"

# Embedding model (always local via Ollama)
embedding:
  model: "nomic-embed-text"
  base_url: "http://localhost:11434"

# ChromaDB
vectorstore:
  path: "./vectorstore"
  collection: "localdesk_kb"

# Database
database:
  path: "./data/db/localdesk.db"

# Audit logging
audit:
  path: "./logs/audit.jsonl"

# Server
server:
  host: "0.0.0.0"
  port: 7860
